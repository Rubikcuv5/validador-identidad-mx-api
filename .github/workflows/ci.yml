name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "fastapi>=0.111.0" "uvicorn>=0.29.0" "pydantic>=2.7.0" "httpx>=0.27.0" "pytest>=8.2.0" "pytest-cov>=5.0.0"
      - run: pytest -v --cov=app --cov-fail-under=80

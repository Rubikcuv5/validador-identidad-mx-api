repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: .venv/bin/pytest -v --cov=app --cov-fail-under=80
        language: system
        pass_filenames: false
        always_run: true
